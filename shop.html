<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوكشر | كل المنتجات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="overlay" id="overlay" onclick="closeAllSidebars()"></div>
    <!-- Header -->
    <header>
      <nav>
        <div class="nav-right">
          <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
          </button>
          <a href="perfurmes.html" class="logo">لوك<span>شر</span></a>
        </div>
        
        <div class="search-container">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="ابحث عن عطر..." />
        </div>

        <ul class="nav-links">
          <li><a href="perfurmes.html">الرئيسية</a></li>
          <li><a href="shop.html">المجموعات</a></li>
          <li><a href="perfurmes.html#contact">تواصل معنا</a></li>
        </ul>

        <div class="nav-actions">
          <button class="nav-icon-btn" onclick="toggleTheme()" id="themeToggle">
            <i class="fas fa-moon"></i>
          </button>
          <button class="nav-icon-btn" onclick="toggleWishlistSidebar()">
            <i class="far fa-heart"></i>
          </button>
          <button class="cart-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count">0</span>
          </button>
        </div>
      </nav>
    </header>

    <!-- Page Content -->
    <section class="collection" style="margin-top: 100px;">
      <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 0 2rem;">
        <h2 class="section-title">استكشف مجموعتنا</h2>
        
        <div class="shop-layout">
          <!-- Filter Sidebar -->
          <aside class="filter-sidebar">
            <div class="filter-group">
              <h4>التصنيفات</h4>
              <label class="filter-option"><input type="checkbox" value="يومي" onchange="filterProducts()"> يومي</label>
              <label class="filter-option"><input type="checkbox" value="مسائي" onchange="filterProducts()"> مسائي</label>
              <label class="filter-option"><input type="checkbox" value="خاص" onchange="filterProducts()"> خاص</label>
            </div>
            
            <div class="filter-group">
              <h4>النوتات العطرية</h4>
              <label class="filter-option"><input type="checkbox" value="شرقي" onchange="filterProducts()"> شرقي</label>
              <label class="filter-option"><input type="checkbox" value="زهري" onchange="filterProducts()"> زهري</label>
              <label class="filter-option"><input type="checkbox" value="خشبي" onchange="filterProducts()"> خشبي</label>
              <label class="filter-option"><input type="checkbox" value="حمضيات" onchange="filterProducts()"> حمضيات</label>
            </div>

            <div class="filter-group">
              <h4>نطاق السعر</h4>
              <input type="range" min="100" max="500" value="500" id="priceRange" oninput="filterProducts()" style="width: 100%; accent-color: var(--gold);">
              <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 0.5rem;">
                <span>$100</span>
                <span id="priceLabel">$500</span>
              </div>
            </div>
          </aside>

          <!-- Main Grid -->
          <div class="perfume-grid" id="fullProductGrid">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </div>
    </section>

    <!-- Wishlist Sidebar -->
    <div class="cart-sidebar" id="wishlistSidebar">
      <div class="cart-header">
        <h3 class="cart-title">قائمة الأمنيات</h3>
        <button class="close-cart" onclick="toggleWishlistSidebar()">&times;</button>
      </div>
      <div id="wishlistItems">
        <!-- Wishlist items will be populated by JavaScript -->
      </div>
    </div>

    <!-- Shopping Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3 class="cart-title">سلة التسوق</h3>
        <button class="close-cart" onclick="toggleCart()">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div class="cart-total">
        <div class="total-price" id="cartTotal">$0</div>
        <button class="checkout-btn" onclick="showCheckout()">المتابعة للدفع</button>
      </div>
    </div>

    <!-- Checkout Modal -->
    <div class="checkout-modal" id="checkoutModal">
      <div class="modal-content">
        <!-- Close Button (X) -->
        <button class="close-modal" onclick="closeCheckout()" aria-label="Close">&times;</button>
        
        <h2 class="section-title" style="font-size: 2rem; margin-bottom: 2rem;">إتمام الشراء</h2>
        <form onsubmit="processPayment(event)">
          <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" required placeholder="أدخل اسمك بالكامل" />
          </div>
          <div class="form-group">
            <label>العنوان</label>
            <input type="text" required placeholder="عنوان الشحن بالتفصيل" />
          </div>
          <div class="form-group">
            <label>بيانات البطاقة</label>
            <input type="text" required placeholder="0000 0000 0000 0000" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>تاريخ الانتهاء</label>
              <input type="text" required placeholder="MM/YY" />
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="text" required placeholder="123" />
            </div>
          </div>
          <button type="submit" class="checkout-btn">تأكيد الدفع</button>
        </form>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- Footer -->
    <footer>
      <div class="footer-content">
        <div class="newsletter">
          <h3>ابقَ في عالم العطور</h3>
          <p>اشترك للحصول على العروض الحصرية والإصدارات الجديدة</p>
          <form class="newsletter-form" onsubmit="subscribe(event)">
            <input type="email" placeholder="أدخل بريدك الإلكتروني" required />
            <button type="submit">اشتراك</button>
          </form>
        </div>
        <div>
          <h4>تابعنا</h4>
          <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 لوكشر. جميع الحقوق محفوظة.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
