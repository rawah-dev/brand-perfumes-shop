<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Success | Luxure</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .success-page {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: var(--bg-color);
        color: var(--text-color);
      }
      .success-card {
        background: var(--card-bg);
        padding: 4rem;
        border-radius: 40px;
        box-shadow: var(--shadow);
        max-width: 500px;
      }
      .success-icon {
        font-size: 5rem;
        color: var(--gold);
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="success-page">
      <div class="success-card">
        <i class="fas fa-check-circle success-icon"></i>
        <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 1rem;">تم الطلب بنجاح!</h1>
        <p style="color: #666; margin-bottom: 2rem;">شكراً لك على ثقتك. عطركم الفاخر قيد التجهيز الآن وسيتم شحنه إليكم قريباً.</p>
        <a href="perfurmes.html" class="cta-btn">العودة للرئيسية</a>
      </div>
    </div>
  </body>
</html>
